name: newsmind_mobile
description: NewsMind AI - AI-powered journalism mobile app
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.0
  shared_preferences: ^2.2.2
  provider: ^6.1.1
  google_fonts: ^6.1.0
  shimmer: ^3.0.0
  flutter_animate: ^4.3.0
  url_launcher: ^6.2.2
  share_plus: ^7.2.1
  intl: ^0.19.0
  flutter_secure_storage: ^9.0.0
  connectivity_plus: ^5.0.2
  http_certificate_pinning: ^3.0.0
  flutter_card_swiper: ^7.0.1
  cached_network_image: ^3.4.1
  go_router: ^14.0.0
  google_sign_in: ^6.2.1
  flutter_svg: ^2.0.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/

  fonts:
    - family: Fraunces
      fonts:
        - asset: assets/fonts/Fraunces-Variable.ttf
        - asset: assets/fonts/Fraunces-Italic-Variable.ttf
          style: italic
    - family: Newsreader
      fonts:
        - asset: assets/fonts/Newsreader-Regular.ttf
          weight: 400
        - asset: assets/fonts/Newsreader-Italic.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/Newsreader-Medium.ttf
          weight: 500
        - asset: assets/fonts/Newsreader-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Newsreader-Bold.ttf
          weight: 700
    - family: Schibsted Grotesk
      fonts:
        - asset: assets/fonts/SchibstedGrotesk-Regular.ttf
          weight: 400
        - asset: assets/fonts/SchibstedGrotesk-Medium.ttf
          weight: 500
        - asset: assets/fonts/SchibstedGrotesk-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/SchibstedGrotesk-Bold.ttf
          weight: 700
        - asset: assets/fonts/SchibstedGrotesk-ExtraBold.ttf
          weight: 800
    - family: IBM Plex Mono
      fonts:
        - asset: assets/fonts/IBMPlexMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/IBMPlexMono-Medium.ttf
          weight: 500
        - asset: assets/fonts/IBMPlexMono-SemiBold.ttf
          weight: 600
